name: phpstan-botwig

# Level-5 static-analysis guard-rail for the Twig back-office bundle
# (thelia/backoffice-default-twig-template). The bundle lives in its own repo
# (thelia-templates/default-twig) and is NOT loaded in the test env, so neither
# `composer phpstan` (core only) nor the PHPUnit suites cover it (debt B-052).
# This job closes that blind spot.
#
# PHPStan needs the Propel models generated (var/propel/test/model) to resolve the
# i18n getters. bin/test-prepare builds them via App\Kernel in-process (the cold
# TheliaKernel build used by the legacy `thelia:install` fails with "No schema files
# were found"). A .env.test.local points it at the runner's MySQL.
on:
  push:
    branches: [ twig, main, master ]
  pull_request:
    branches: [ twig, main, master ]

jobs:
  phpstan-botwig:
    name: PHPStan level 5 (BO Twig bundle)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start MySQL
        # The runner ships MySQL pre-installed (root/root on 127.0.0.1:3306); using
        # it avoids the flaky service-container init on this runner image.
        run: sudo systemctl start mysql.service

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          ini-values: post_max_size=20M
          extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite, mysql, gd, zip

      - name: Install Composer dependencies
        run: |
          composer install --no-progress --prefer-dist --optimize-autoloader
          composer update --no-interaction --prefer-dist

      - name: Prepare test env (builds the Propel models via App\Kernel)
        run: |
          printf 'DATABASE_HOST=127.0.0.1\nDATABASE_PORT=3306\nDATABASE_USER=root\nDATABASE_PASSWORD=root\nDATABASE_NAME=test\n' > .env.test.local
          php bin/test-prepare

      - name: Sync the bundle to its working branch
        # composer installs the published tag; replace the source with the live
        # branch so the analysed code matches phpstan-baseline-botwig.neon.
        run: |
          rm -rf templates/backOffice/default-twig
          git clone --depth 1 --branch main https://github.com/thelia-templates/default-twig.git templates/backOffice/default-twig

      - name: PHPStan (level 5 + dedicated baseline)
        run: ./vendor/bin/phpstan analyse -c phpstan-botwig.neon --level=5 --no-progress --error-format=github templates/backOffice/default-twig/src
